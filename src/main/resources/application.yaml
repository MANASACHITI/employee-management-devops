spring:
  application:
    name: employee-management

  datasource:
    url: jdbc:h2:mem:emsdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics